[server]
host = "127.0.0.1"
port = 3000
workers = 0  # 0 = auto (num_cpus)

[database]
url = "sqlite://asterdrive.db"  # 或 postgres://user:pass@localhost/asterdrive
pool_size = 10
retry_count = 3

[auth]
jwt_secret = "change-me-in-production"
access_token_ttl_secs = 900       # 15 分钟
refresh_token_ttl_secs = 604800   # 7 天

[cache]
enabled = true
backend = "memory"   # "memory" | "redis"
redis_url = ""
default_ttl = 3600

[logging]
level = "info"       # trace | debug | info | warn | error
format = "text"      # "text" | "json"
file = ""            # 留空 = stdout only

name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees:
  - AptS-1547
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Storage backends
        - File management
        - Authentication / authorization
        - Admin features
        - Frontend / UI
        - API
        - Performance
        - Deployment / operations
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
        - label: I can help test and provide feedback

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for similar requests
          required: true

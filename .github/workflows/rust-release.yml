name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: frontend-panel
        run: |
          bun install --frozen-lockfile
          bun run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-panel/dist
          retention-days: 1

  build-linux-windows:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux_x86_64
            packages: musl-tools
          - target: x86_64-pc-windows-gnu
            name: windows_x86_64.exe
            packages: gcc-mingw-w64-x86-64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-panel/dist

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure linker
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV
              ;;
            x86_64-pc-windows-gnu)
              echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
              ;;
          esac

      - name: Build
        run: |
          RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s" \
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          SRC="target/${{ matrix.target }}/release/aster_drive"
          [[ "${{ matrix.target }}" == *windows* ]] && SRC="${SRC}.exe"
          mv "$SRC" "aster_drive_${VERSION}_${{ matrix.name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: aster_drive_*

  build-arm64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-panel/dist

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu

      - name: Install ARM64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RUSTFLAGS: "-C target-feature=+crt-static -C link-arg=-s"
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Rename binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mv target/aarch64-unknown-linux-gnu/release/aster_drive "aster_drive_${VERSION}_linux_aarch64"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-linux_aarch64
          path: aster_drive_*

  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macos_aarch64
          - target: x86_64-apple-darwin
            name: macos_x86_64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-panel/dist

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          RUSTFLAGS: "-C link-arg=-s"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mv target/${{ matrix.target }}/release/aster_drive "aster_drive_${VERSION}_${{ matrix.name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: aster_drive_*

  release:
    needs: [build-linux-windows, build-arm64, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "aster_drive_*" -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AsterDrive ${{ github.ref_name }}
          body: |
            ## Download

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x86_64 | [aster_drive_${{ github.ref_name }}_linux_x86_64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aster_drive_${{ github.ref_name }}_linux_x86_64) |
            | Linux | ARM64 | [aster_drive_${{ github.ref_name }}_linux_aarch64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aster_drive_${{ github.ref_name }}_linux_aarch64) |
            | Windows | x86_64 | [aster_drive_${{ github.ref_name }}_windows_x86_64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aster_drive_${{ github.ref_name }}_windows_x86_64.exe) |
            | macOS | x86_64 | [aster_drive_${{ github.ref_name }}_macos_x86_64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aster_drive_${{ github.ref_name }}_macos_x86_64) |
            | macOS | ARM64 | [aster_drive_${{ github.ref_name }}_macos_aarch64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aster_drive_${{ github.ref_name }}_macos_aarch64) |

            **Checksums**: [checksums.txt](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt)
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
